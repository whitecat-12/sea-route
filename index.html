<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Marine Router - Splash Screen</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #0a2e42 0%, #1a5c7a 50%, #0f4b63 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animasi gelombang laut di background */
    .waves {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.1)" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,250.7C960,235,1056,181,1152,170.7C1248,160,1344,192,1392,208L1440,224L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/></svg>');
      background-size: cover;
      animation: wave 8s ease-in-out infinite;
    }

    .waves:nth-child(2) {
      bottom: 10px;
      opacity: 0.5;
      animation: wave 12s ease-in-out infinite reverse;
    }

    .waves:nth-child(3) {
      bottom: 20px;
      opacity: 0.3;
      animation: wave 15s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Container utama */
    .splash-container {
      text-align: center;
      z-index: 10;
      padding: 20px;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo / Ikon Kapal */
    .logo-wrapper {
      margin-bottom: 30px;
      position: relative;
    }

    .ship-icon {
      font-size: 80px;
      color: #ffffff;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-15px) rotate(0deg); }
    }

    .pulse-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.9);
        opacity: 0.7;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }

    /* Judul Aplikasi */
    .app-title {
      font-size: 36px;
      font-weight: 700;
      color: white;
      text-shadow: 0 4px 15px rgba(0,0,0,0.3);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .app-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    /* Loading Bar */
    .loading-container {
      width: 250px;
      margin: 0 auto 20px;
    }

    .loading-text {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #64b5f6, #2196f3);
      border-radius: 10px;
      animation: loading 2.5s ease-in-out forwards;
      box-shadow: 0 0 10px #2196f3;
    }

    @keyframes loading {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* Status Text */
    .status-text {
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-text i {
      animation: spin 2s linear infinite;
      font-size: 14px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 25px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      z-index: 10;
    }

    /* Tombol Skip (opsional) */
    .skip-btn {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 24px;
      border-radius: 40px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 0.5s 2s forwards;
    }

    .skip-btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .app-title {
        font-size: 28px;
      }
      .ship-icon {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Waves -->
  <div class="waves"></div>
  <div class="waves"></div>
  <div class="waves"></div>

  <!-- Main Splash Content -->
  <div class="splash-container">
    <div class="logo-wrapper">
      <div class="pulse-ring"></div>
      <i class="fas fa-ship ship-icon"></i>
    </div>

    <h1 class="app-title">Sea Route</h1>
    <div class="app-subtitle">Indonesia</div>

    <div class="loading-container">
      <div class="loading-text">
        <span>Memuat data</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="status-text" id="statusMessage">
      <i class="fas fa-satellite"></i>
      <span>Menghubungkan ke satelit...</span>
    </div>
  </div>

  <!-- Skip Button -->
  <button class="skip-btn" onclick="skipSplash()">
    <i class="fas fa-arrow-right"></i> Masuk Aplikasi
  </button>

  <!-- Footer -->
  <div class="footer">
    <i class="far fa-copyright"></i> 2026 Sea Route ID • v1.0.0
  </div>

  <script>
    // Simulasi loading dengan update status dan progress
    const statusMessages = [
      { text: 'Menghubungkan ke satelit...', icon: 'fa-satellite' },
      { text: 'Memuat data waypoint laut...', icon: 'fa-map-marked-alt' },
      { text: 'Memproses data pulau...', icon: 'fa-mountain' },
      { text: 'Membangun graf navigasi...', icon: 'fa-project-diagram' },
      { text: 'Sistem siap digunakan!', icon: 'fa-check-circle' }
    ];

    let currentStep = 0;
    const progressPercent = document.getElementById('progressPercent');
    const statusMessage = document.getElementById('statusMessage');

    function updateStatus(step) {
      if (step >= statusMessages.length) return;
      
      const msg = statusMessages[step];
      statusMessage.innerHTML = `<i class="fas ${msg.icon}"></i><span>${msg.text}</span>`;
      
      // Update progress (0%, 25%, 50%, 75%, 100%)
      const percent = Math.round((step + 1) * (100 / statusMessages.length));
      progressPercent.textContent = percent + '%';
    }

    // Update status setiap 500ms
    const interval = setInterval(() => {
      currentStep++;
      updateStatus(currentStep);
      
      if (currentStep >= statusMessages.length - 1) {
        clearInterval(interval);
        
        // Setelah selesai, otomatis redirect ke aplikasi utama
        setTimeout(() => {
          window.location.href = 'searoute.html';
        }, 800);
      }
    }, 500);

    // Mulai dengan status pertama
    updateStatus(0);

    // Fungsi skip splash screen
    function skipSplash() {
      clearInterval(interval);
      window.location.href = 'searoute.html';
    }

    // Jika user menekan tombol apapun, bisa juga skip
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' || e.key === 'Enter') {
        skipSplash();
      }
    });
  </script>

</body>
</html>
